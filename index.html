<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A minimalist text-to-speech app that works in any browser. Type your text and hear it spoken aloud instantly." />
  <title>Speak — Text to Speech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="app">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" fill="currentColor"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          <line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <span class="logo-text">Speak</span>
      </div>
      <span class="badge" id="support-badge">Checking…</span>
    </header>

    <!-- Main Card -->
    <main class="card">

      <!-- Textarea -->
      <div class="textarea-wrapper">
        <textarea
          id="tts-input"
          class="tts-textarea"
          placeholder="Type something to speak…"
          maxlength="5000"
          aria-label="Text to speak"
          spellcheck="true"
        ></textarea>
        <div class="char-count">
          <span id="char-current">0</span> / 5000
        </div>
      </div>

      <!-- Controls -->
      <div class="controls">

        <!-- Voice -->
        <div class="control-group">
          <label class="control-label" for="voice-select">Voice</label>
          <div class="select-wrapper">
            <select id="voice-select" class="control-select" aria-label="Select voice">
              <option value="">Loading voices…</option>
            </select>
            <svg class="select-arrow" viewBox="0 0 10 6" aria-hidden="true">
              <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <!-- Speed -->
        <div class="control-group">
          <label class="control-label" for="rate-range">
            Speed <span id="rate-value" class="range-value">1.0×</span>
          </label>
          <input id="rate-range" type="range" class="control-range"
            min="0.5" max="2" step="0.1" value="1" aria-label="Speech rate" />
        </div>

        <!-- Pitch -->
        <div class="control-group">
          <label class="control-label" for="pitch-range">
            Pitch <span id="pitch-value" class="range-value">1.0</span>
          </label>
          <input id="pitch-range" type="range" class="control-range"
            min="0" max="2" step="0.1" value="1" aria-label="Speech pitch" />
        </div>

        <!-- Volume -->
        <div class="control-group">
          <label class="control-label" for="volume-range">
            Volume <span id="volume-value" class="range-value">100%</span>
          </label>
          <input id="volume-range" type="range" class="control-range"
            min="0" max="1" step="0.05" value="1" aria-label="Speech volume" />
        </div>

      </div>

      <!-- Buttons -->
      <div class="actions">
        <button id="btn-speak" class="btn btn-primary" aria-label="Start speaking">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <polygon points="5,3 19,12 5,21" fill="currentColor"/>
          </svg>
          Speak
        </button>
        <button id="btn-pause" class="btn btn-secondary" disabled aria-label="Pause speech">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="6" y="4" width="4" height="16" fill="currentColor" rx="1"/>
            <rect x="14" y="4" width="4" height="16" fill="currentColor" rx="1"/>
          </svg>
          Pause
        </button>
        <button id="btn-stop" class="btn btn-ghost" disabled aria-label="Stop speech">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <rect x="4" y="4" width="16" height="16" fill="currentColor" rx="2"/>
          </svg>
          Stop
        </button>
        <button id="btn-clear" class="btn btn-ghost" aria-label="Clear text">
          <svg class="btn-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Clear
        </button>
      </div>

      <!-- Progress bar -->
      <div class="progress-track" id="progress-track" aria-hidden="true">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <!-- Status -->
      <p class="status-text" id="status-text" aria-live="polite">Ready</p>

    </main>

    <!-- Footer -->
    <footer class="footer">
      Powered by the Web Speech API &mdash; works offline
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
